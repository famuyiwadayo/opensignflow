services:
  postgres:
    image: postgres:16-alpine
    container_name: opensignflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opensignflow
      POSTGRES_USER: opensignflow
      POSTGRES_PASSWORD: opensignflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensignflow -d opensignflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opensignflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: opensignflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opensignflow
      MINIO_ROOT_PASSWORD: opensignflow-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: opensignflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 opensignflow opensignflow-secret;
      mc mb --ignore-existing local/opensignflow-documents;
      mc anonymous set none local/opensignflow-documents;
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: opensignflow-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  redis-data:
  minio-data:
